# Exp5: High-dimensional (n=200, p=1000) - sigma fixed at 1.0
experiment: exp5_highdim
description: "Exp5 High-dimensional n=200 p=1000 sigma=1.0"
algo: adaptive_flipped_lasso_cv
n_samples: 200
n_features: 1000
n_nonzero: 30
correlation_type: ar1
rho: 0.8
random_state: 42
n_repeats: 10
cv_folds: 5
search_space:
  sigma: [1.0]
compare_models:
  - algo: aflclassifier_cv
    display: AFL-CV-1SE
    params:
      lambda_ridge_list: [0.5, 1.0, 2.0]
      gamma_list: [0.3, 0.5, 0.7]
      cv: 10
      n_alpha: 50
    cv: true
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
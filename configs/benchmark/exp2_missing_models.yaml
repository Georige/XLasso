# Benchmark Config - Missing Models (UniLassoCV + FusedLassoCV)
# ===============================================================

experiment: exp2_missing_models
description: "Exp2 Benchmark - UniLassoCV and FusedLassoCV only"
algo: adaptive_flipped_lasso

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# AdaptiveFlippedLasso optimal params (not used in this run)
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5

# Benchmark settings
n_repeats: 5
cv_folds: 1

# SNR study settings (same as original)
search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

# Only UniLassoCV and FusedLassoCV
compare_models:
  - algo: unilasso_cv
    display: UniLassoCV
    params: {}
    cv: true

  - algo: fused_lasso_cv
    display: FusedLassoCV
    params: {}
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
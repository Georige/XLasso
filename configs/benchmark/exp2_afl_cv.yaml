# Benchmark Config - AdaptiveFlippedLasso CV
# =========================================

experiment: exp2_afl_cv
description: "Exp2 Benchmark - AdaptiveFlippedLassoCV across SNR levels"
algo: adaptive_flipped_lasso_cv

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Benchmark settings
n_repeats: 5
cv_folds: 1  # Single train/test split for validation

# SNR study settings
search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

# Only AdaptiveFlippedLassoCV
compare_models:
  - algo: aflclassifier_cv
    display: AdaptiveFlippedLassoCV
    params:
      lambda_ridge_list: [0.1, 1.0, 10.0]
      gamma_list: [0.3, 0.5, 1.0, 2.0]
      cv: 5
      n_alpha: 50
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
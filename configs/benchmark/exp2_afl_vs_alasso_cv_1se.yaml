# Benchmark Config - AdaptiveFlippedLassoCV-1SE vs AdaptiveLassoCV-1SE
# ===================================================================
# Exp2 scenario: AR(1) correlation with multiple SNR settings
# Both algorithms use 1-SE rule for parameter selection
#
# Usage:
#   python factory/sweep.py benchmark --config configs/benchmark/exp2_afl_vs_alasso_cv_1se.yaml

experiment: exp2_afl_vs_alasso_cv_1se
description: "Exp2 Benchmark - AFL-CV-1SE vs AdaptiveLassoCV-1SE across multiple SNR"
algo: adaptive_flipped_lasso_cv

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Benchmark settings
n_repeats: 10
cv_folds: 5  # Internal CV for parameter selection

# SNR study settings - multiple sigma values
search_space:
  sigma: [0.1, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0, 3.0]

# AdaptiveFlippedLasso fixed params (from stage1 tuning)
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5

# Compare models - both use 1-SE rule by default
compare_models:
  - algo: aflclassifier_cv
    display: AFL-CV-1SE
    params:
      lambda_ridge_list: [0.5, 1.0, 2.0]
      gamma_list: [0.3, 0.5, 0.7]
      cv: 10
      n_alpha: 50
    cv: true

  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV-1SE
    params:
      gammas: [0.5, 1.0, 2.0]
      cv: 10
      use_1se: true
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark

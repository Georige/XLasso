# Benchmark Config - AdaptiveFlippedLasso vs Other Models (fixed params)
# ====================================================================
# Usage:
#   python factory/sweep.py benchmark --config configs/benchmark/adaptive_flipped_lasso_exp2_benchmark.yaml

experiment: adaptive_flipped_lasso_exp2_benchmark
description: "Exp2 Benchmark - AdaptiveFlippedLasso (optimal params) vs other models"
algo: adaptive_flipped_lasso  # Placeholder - benchmark mode uses compare_models

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# AdaptiveFlippedLasso optimal params from stage1
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5

# Benchmark settings
n_repeats: 5
cv_folds: 1  # Single train/test split (no slow CV)

# SNR study settings
search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

# Models to compare
compare_models:
  - algo: adaptive_flipped_lasso
    display: AdaptiveFlippedLasso
    params:
      lambda_ridge: 1.0
      lambda_: 1.0
      gamma: 0.5
    cv: false

  - algo: lasso_cv
    display: LassoCV
    params: {}
    cv: true

  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV
    params: {}
    cv: true

  - algo: group_lasso_cv
    display: GroupLassoCV
    params: {}
    cv: true

  - algo: unilasso_cv
    display: UniLassoCV
    params: {}
    cv: true

  - algo: fused_lasso_cv
    display: FusedLassoCV
    params: {}
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
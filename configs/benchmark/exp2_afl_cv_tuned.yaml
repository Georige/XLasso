# Benchmark Config - AdaptiveFlippedLasso CV (Tuned Search Space)
# =============================================================

experiment: exp2_afl_cv_tuned
description: "Exp2 Benchmark - AdaptiveFlippedLassoCV with reduced search space and more training data"
algo: adaptive_flipped_lasso_cv

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Benchmark settings
n_repeats: 5
cv_folds: 1  # Single train/test split for validation

# SNR study settings
search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

# AdaptiveFlippedLassoCV with tuned parameters
compare_models:
  - algo: aflclassifier_cv
    display: AdaptiveFlippedLassoCV
    params:
      lambda_ridge_list: [0.5, 1.0, 2.0]  # 3 values (reduced from 3)
      gamma_list: [0.3, 0.5, 0.7]          # 3 values (reduced from 4)
      cv: 10                                  # 10-fold CV (more training data: 90% per fold)
      n_alpha: 30                             # 30 values (reduced from 50)
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
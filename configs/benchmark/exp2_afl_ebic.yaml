# Benchmark Config - AFL EBIC Parameter Selection
# =============================================================
# Solution 2: EBIC (Extended BIC) instead of CV

experiment: exp2_afl_ebic
description: "Exp2 - AFL with EBIC parameter selection (sigma=0.1, 0.5)"
algo: adaptive_flipped_lasso_ebic

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Benchmark settings
n_repeats: 5
cv_folds: 1  # Single train/test split for validation

# SNR study settings
search_space:
  sigma: [0.1, 0.5]

# AFL with EBIC
compare_models:
  - algo: aflclassifier_ebic
    display: AFL-EBIC
    params:
      lambda_ridge_list: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
      gamma_list: [0.3, 0.5, 0.7, 1.0]
      ebic_gamma: 0.5
      n_alpha: 100
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark

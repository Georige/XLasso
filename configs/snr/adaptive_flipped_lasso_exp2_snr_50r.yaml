# SNR Sensitivity Analysis Config - AdaptiveFlippedLasso (50 repeats)
# ======================================================
# Usage:
#   python factory/sweep.py snr --config configs/snr/adaptive_flipped_lasso_exp2_snr_50r.yaml

experiment: adaptive_flipped_lasso_exp2_snr_50r
description: "Exp2 SNR study - AR(1) correlation with varying sigma (50 repeats)"
algo: adaptive_flipped_lasso

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Fixed best params from stage1 (lambda_ridge, lambda_, gamma)
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5

# SNR study settings - 50 repeats for stability analysis
n_repeats: 50
cv_folds: 1

# Grid search over sigma (this is the SNR study!)
search_space:
  sigma: [0.1, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0, 3.0]

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/exp2_snr_50r
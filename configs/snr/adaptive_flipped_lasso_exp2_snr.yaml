# SNR Sensitivity Analysis Config - AdaptiveFlippedLasso
# ======================================================
# Usage:
#   python factory/sweep.py snr --config configs/snr/adaptive_flipped_lasso_exp2_snr.yaml

experiment: adaptive_flipped_lasso_exp2_snr
description: "Exp2 SNR study - AR(1) correlation with varying sigma"
algo: adaptive_flipped_lasso

# Data generation parameters (Exp2: AR(1) correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Fixed best params from stage1 (lambda_ridge, lambda_, gamma)
# These are the parameters to keep fixed while varying sigma
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5

# SNR study settings
n_repeats: 5
cv_folds: 1

# Grid search over sigma (this is the SNR study!)
# sigma = noise standard deviation
# SNR = 1/sigma (for beta=1.0)
search_space:
  sigma: [0.1, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0, 3.0]

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/snr
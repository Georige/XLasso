# Exp7 AdaptiveFlippedLassoCV Sigma Sensitivity Benchmark
# ======================================================
# Exp7 settings: AR(1) Sign Avalanche, n=300, p=500, ρ=0.9
# First 20 variables with alternating signs and decaying magnitudes
# β_j = (-1)^(j+1) * 2.0 * 0.9^((j-1)/2), j=1..20
# e.g. β1=2.0, β2=-1.8, β3=1.62, β4=-1.458, ...
# Family: gaussian
# Method: adaptive_flipped_lasso_cv with internal 5-fold CV
# Repeats: 10 (external repeats for each sigma value)
#
# Usage:
#   python factory/sweep.py benchmark --config configs/exp7_afl_cv_sigma.yaml

experiment: exp7_afl_cv_sigma
description: "Exp7 sigma sensitivity with AdaptiveFlippedLassoCV (5-fold internal CV), 10 repeats"
algo: adaptive_flipped_lasso_cv

# Data generation parameters (Exp7 settings)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: experiment7
rho: 0.9
family: gaussian
random_state: 42

# External experiment settings
n_repeats: 10
cv_folds: 5

# Primary metric
primary_metric: f1

# Sigma values to test
search_space:
  sigma: [0.5, 1.0, 2.0, 5.0, 10.0]

# AdaptiveFlippedLassoCV parameters (uses internal 5-fold CV)
lambda_ridge_list: [0.1, 1.0, 10.0]
gamma_list: [0.5, 1.0, 2.0]
alpha_min_ratio: 0.0001
n_alpha: 50
max_iter: 2000
tol: 0.0001

# Only run AdaptiveFlippedLassoCV, no model comparison
compare_models:
  - algo: adaptive_flipped_lasso_cv
    display: AdaptiveFlippedLassoCV
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/exp7_afl_cv_sigma
# Exp2 AdaptiveFlippedLassoCV Sigma Sensitivity Benchmark
# ======================================================
# Exp2 settings: AR(1) correlation rho=0.8, n=300, p=500, odd-indexed first 20 variables β=1.0
# Method: adaptive_flipped_lasso_cv with internal 5-fold CV
# Repeats: 10 (external repeats for each sigma value)
#
# Usage:
#   python factory/sweep.py benchmark --config configs/exp2_afl_cv_sigma.yaml

experiment: exp2_afl_cv_sigma
description: "Exp2 sigma sensitivity with AdaptiveFlippedLassoCV (5-fold internal CV), 10 repeats"
algo: adaptive_flipped_lasso_cv

# Data generation parameters (Exp2 settings)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: experiment2
rho: 0.8
random_state: 42

# External experiment settings
n_repeats: 10
cv_folds: 5

# Primary metric
primary_metric: f1

# Sigma values to test
search_space:
  sigma: [0.5, 1.0, 2.0, 5.0, 10.0]

# AdaptiveFlippedLassoCV parameters (uses internal 5-fold CV)
lambda_ridge_list: [0.1, 1.0, 10.0]
gamma_list: [0.5, 1.0, 2.0]
alpha_min_ratio: 0.0001
n_alpha: 50
max_iter: 2000
tol: 0.0001

# Only run AdaptiveFlippedLassoCV, no model comparison
compare_models:
  - algo: adaptive_flipped_lasso_cv
    display: AdaptiveFlippedLassoCV
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/exp2_afl_cv_sigma
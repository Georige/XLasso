# Exp5 PFL vs AdaptiveLassoCV Sigma Sensitivity Benchmark
# ======================================================
# Exp5 settings: Perfect Masking trap, n=300, p=1000
# 10 pairs twin variables with ρ=0.8, β_{2t-1}=2.0, β_{2t}=-2.5
# Core challenge: designed to make marginal correlation of true signals zero
# Family: gaussian
# Methods: PFLRegressorCV (BAFL) vs AdaptiveLassoCV
# Repeats: 5 (external repeats for each sigma value)
#
# Usage:
#   python factory/sweep.py benchmark --config configs/exp5_afl_cv_sigma.yaml

experiment: exp5_pfl_vs_adaptive
description: "Exp5 sigma sensitivity: PFLRegressorCV (BAFL) vs AdaptiveLassoCV, 5 repeats"
algo: pfl_regressor_cv

# Data generation parameters (Exp5 settings)
n_samples: 300
n_features: 1000
n_nonzero: 20
correlation_type: experiment5
rho: 0.8
family: gaussian
random_state: 42

# External experiment settings
n_repeats: 20
cv_folds: 5
n_jobs: -1

# Primary metric
primary_metric: f1
max_iter: 10000

# Sigma values to test
search_space:
  sigma: [0.5, 1.0, 2.0, 3.0]

compare_models:
  - algo: pfl_regressor_cv
    display: CG-Lasso
    cv: true
    lambda_ridge_list: [0.1, 1.0, 10.0, 100.0]
    gamma: 1.0
    weight_cap: 10.0
    alpha_min_ratio: 0.0001
    n_alpha: 100
    max_iter: 10000
    tol: 0.0001
    standardize: true
    fit_intercept: true
  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV (fixed)
    cv: true
  - algo: lasso_cv
    display: LassoCV
    cv: true
  - algo: unilasso_cv
    display: UnilassoCV
    cv: true
  - algo: relaxed_lasso_1se
    display: RelaxedLassoCV
    cv: true
  - algo: elasticnet_1se
    display: ElasticNetCV
    cv: true

# Output settings
output_dir: ./experiments/results/exp5_pfl_vs_adaptive

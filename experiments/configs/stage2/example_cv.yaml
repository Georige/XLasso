# Stage2 Configuration - Fine-grained CV within Optimal Region
# ===========================================================
# Usage:
#   python factory/sweep.py stage2 --config configs/stage2/example_cv.yaml

experiment: example_cv
description: "Stage 2 fine-grained CV tuning within optimal structural region"
algo: unilasso

# Reference to Stage1 best config
base_config: configs/stage1/example_best.yaml

# Data generation parameters (inherited from base_config)
n_samples: 300
n_features: 500
n_nonzero: 20
sigma: 1.0
correlation_type: pairwise
rho: 0.5
random_state: 42

# CV settings
n_repeats: 5
cv_folds: 5

# Primary metric for optimization
primary_metric: f1
secondary_metric: tpr

# Best structural region from Stage1 (will be overridden by actual Stage1 results)
best_structural_region:
  lambda_1: [0.001, 0.005]
  lambda_2: [0.003, 0.008]
  group_threshold: [0.6, 0.8]

# Fine-grained search space (Stage 2)
fine_search_space:
  lambda_1: [0.001, 0.002, 0.003, 0.004, 0.005]
  lambda_2: [0.003, 0.004, 0.005, 0.006, 0.007, 0.008]
  group_threshold: [0.6, 0.65, 0.7, 0.75, 0.8]

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/stage2

# Algorithm parameters
algo_params:
  standardize: true
  fit_intercept: true
  family: gaussian
  backend: numba
  adaptive_weighting: false
  weight_method: t_statistic
  gamma: 1.0
  enable_group_constraint: false
  corr_threshold: 0.7
  group_penalty: 5.0
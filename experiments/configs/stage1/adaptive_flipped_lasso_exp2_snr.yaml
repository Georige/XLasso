# Stage1 Config - Exp2 SNR Study
# Grid search over sigma values with fixed best params
experiment: adaptive_flipped_lasso_exp2_snr
description: "Exp2 SNR study - grid search over sigma with fixed best params"
algo: adaptive_flipped_lasso

# Data generation parameters (Exp2 settings)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42

# Fixed best params from exp2 stage1
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5

# CV settings (no CV for stage1)
n_repeats: 5
cv_folds: 1

# Grid search over sigma (SNR study)
search_space:
  sigma: [0.1, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0, 3.0]

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/exp2_snr

# Stage1 Configuration - Grid Search for Optimal Structural Region
# ================================================================
# Usage:
#   python factory/sweep.py stage1 --config configs/stage1/example.yaml

experiment: example
description: "Stage 1 grid search to find optimal structural region"
algo: unilasso

# Data generation parameters
n_samples: 300
n_features: 500
n_nonzero: 20
sigma: 1.0
correlation_type: pairwise  # pairwise, ar1, twin, block
rho: 0.5
random_state: 42

# Cross-validation settings
n_repeats: 3
cv_folds: 5

# Primary metric for optimization
primary_metric: f1
secondary_metric: tpr

# Grid search space (Stage 1: coarse grid)
search_space:
  lambda_1: [0.0001, 0.001, 0.01, 0.1]
  lambda_2: [0.0001, 0.001, 0.01, 0.1]
  group_threshold: [0.5, 0.6, 0.7, 0.8, 0.9]

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/stage1

# Optional: specific algorithm parameters
algo_params:
  standardize: true
  fit_intercept: true
  family: gaussian
  backend: numba
  adaptive_weighting: false
  weight_method: t_statistic
  gamma: 1.0
  enable_group_constraint: false
  corr_threshold: 0.7
  group_penalty: 5.0
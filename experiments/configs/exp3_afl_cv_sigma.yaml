# Exp3 PFL vs AdaptiveLassoCV Sigma Sensitivity Benchmark
# ======================================================
# Exp3 settings: AR(1) correlation rho=0.8, n=300, p=500, first 20 variables β=1.0
# Family: binomial (binary classification with offset)
# Methods: PFLClassifierCV (BAFL) vs AdaptiveLassoCV
# Repeats: 5 (external repeats for each sigma value)
#
# Usage:
#   python factory/sweep.py benchmark --config configs/exp3_afl_cv_sigma.yaml

experiment: exp3_pfl_vs_adaptive
description: "Exp3 sigma sensitivity: PFLClassifierCV (BAFL) vs AdaptiveLassoCV, 5 repeats"
algo: pfl_classifier_cv

# Data generation parameters (Exp3 settings)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: experiment3
rho: 0.8
family: binomial
random_state: 42

# External experiment settings
n_repeats: 1
cv_folds: 2
n_jobs: -1

# Primary metric
primary_metric: f1
max_iter: 10000

# Sigma values to test
search_space:
  sigma: [0.5, 1.0, 2.0, 3.0]

compare_models:
  - algo: pfl_classifier_cv
    display: PFLClassifierCV (BAFL, gamma=1.0, cap=10.0)
    cv: true
    lambda_ridge_list: [0.1, 1.0, 10.0, 100.0]
    gamma: 1.0
    weight_cap: 10.0
    alpha_min_ratio: 0.0001
    n_alpha: 100
    max_iter: 10000
    tol: 0.0001
    standardize: true
    fit_intercept: true
  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV (fixed)
    cv: true
  - algo: lasso_cv
    display: LassoCV
    cv: true
  - algo: unilasso_cv
    display: UnilassoCV
    cv: true
  - algo: relaxed_lasso_1se
    display: RelaxedLassoCV
    cv: true
  - algo: elasticnet_1se
    display: ElasticNetCV
    cv: true

# Output settings
output_dir: ./experiments/results/exp3_pfl_vs_adaptive

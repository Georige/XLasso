# Exp3 AFL-CV-EN vs AdaptiveLassoCV Sigma Sensitivity Benchmark
# ======================================================
# Exp3 settings: AR(1) correlation rho=0.8, n=300, p=500, first 20 variables β=1.0
# Family: binomial (binary classification with offset)
# Methods: AFL-CV-EN (ElasticNet prior) vs AdaptiveLassoCV
# Repeats: 5 (external repeats for each sigma value)
#
# Usage:
#   python factory/sweep.py benchmark --config configs/exp3_afl_cv_sigma.yaml

experiment: exp3_afl_cv_en_vs_adaptive
description: "Exp3 sigma sensitivity: AFL-CV-EN (ElasticNet prior) vs AdaptiveLassoCV, 5 repeats"
algo: adaptive_flipped_lasso_cv_en_classifier

# Data generation parameters (Exp3 settings)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: experiment3
rho: 0.8
family: binomial
random_state: 42

# External experiment settings
n_repeats: 5
cv_folds: 10
n_jobs: -1

# Primary metric
primary_metric: f1

# Sigma values to test
search_space:
  sigma: [0.5, 2.0, 10.0]

# AdaptiveFlippedLassoCV_EN parameters (ElasticNet first stage, no weight clipping)
lambda_ridge_list: [0.1, 1.0, 5.0, 10.0]
l1_ratio_list: [0.1, 0.5, 0.9]
gamma_list: [0.3, 0.5, 0.7, 1.0, 2.0, 3.0]
alpha_min_ratio: 0.0001
n_alpha: 30
max_iter: 100000
tol: 0.0001
use_post_ols_debiasing: false
auto_tune_collinearity: false
weight_clip_max: null  # No clipping for EN variant
eps: 1.0e-5

compare_models:
  - algo: adaptive_flipped_lasso_cv_en_classifier
    display: AFL-CV-EN (ElasticNet)
    cv: true
  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV (fixed)
    cv: true

# Output settings
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/exp3_afl_cv_en_vs_adaptive

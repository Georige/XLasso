# Exp1 AFL-Fixed Benchmark
# =========================
experiment: exp1_afl_fixed
description: "Exp1: AFL-Fixed benchmark across sigma range"
algo: adaptive_flipped_lasso

# Exp1 data settings
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: pairwise
rho: 0.5
random_state: 42

n_repeats: 5
cv_folds: 1

search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

# Best Stage1 config for AFL-Fixed
lambda_ridge: 10.0
lambda_: 1.0
gamma: 0.5
alpha_min_ratio: 0.0001
n_alpha: 50
max_iter: 2000
tol: 0.0001

output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
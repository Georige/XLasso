# Exp1 AFL-Fixed vs CV-AFL Comparison
# ===================================
# Usage:
#   python factory/sweep.py benchmark --config configs/benchmark/exp1_afl_cv_compare.yaml

experiment: exp1_afl_cv_compare
description: "Exp1: AFL-Fixed vs CV-AFL comparison across sigma range"
algo: adaptive_flipped_lasso

# Exp1 data settings
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: pairwise
rho: 0.5
random_state: 42

n_repeats: 5
cv_folds: 1

search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

# AFL-Fixed (best Stage1 config for exp1)
# lambda_ridge: 10.0, lambda_: 1.0, gamma: 0.5

# CV-AFL (with 1-SE rule)
compare_models:
  - algo: aflclassifier_cv
    display: AFL-CV
    params:
      lambda_ridge_list: [0.5, 1.0, 2.0, 5.0, 10.0]
      gamma_list: [0.3, 0.5, 0.7, 1.0]
      cv: 10
      n_alpha: 30
    cv: true

# Best Stage1 config for AFL-Fixed
lambda_ridge: 10.0
lambda_: 1.0
gamma: 0.5
alpha_min_ratio: 0.0001
n_alpha: 50
max_iter: 2000
tol: 0.0001

output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
sigma: 1.0
# Exp5 绝对隐身陷阱场景 - 各模型1-SE版本对比实验
# ========================================================
# Usage:
#   python factory/sweep.py benchmark --config configs/benchmark/exp5_1se_compare.yaml

experiment: exp5_1se_compare
description: "Exp5 绝对隐身陷阱: UniLassoCV vs LassoCV vs AFLCV vs RelaxedLassoCV vs ElasticNetCV vs AdaptiveLasso (all 1-SE)"
algo: adaptive_flipped_lasso

# Exp5 data settings (绝对隐身陷阱 Perfect Masking)
n_samples: 300
n_features: 1000
n_nonzero: 20  # 10 pairs of twin variables
correlation_type: experiment5
rho: 0.8
random_state: 42

# Benchmark settings
n_repeats: 5
cv_folds: 1  # Single train/test split per repeat

# Fixed sigma (no SNR sweep for this comparison)
sigma: 1.0

search_space:
  sigma: [1.0]  # Required field but not used

# Models to compare (all 1-SE versions)
compare_models:
  - algo: unilasso_cv
    display: UniLassoCV_1SE
    params:
      use_1se: true
      verbose: false
    cv: true

  - algo: lasso_cv
    display: LassoCV_1SE
    params:
      use_1se: true
      random_state: 42
      cv: 5
    cv: true

  - algo: aflclassifier_cv
    display: AFLCV_1SE
    params:
      lambda_ridge: 50.0
      gamma: 0.1
      lambda_: 0.1
      n_folds: 5
      verbose: false
    cv: true

  - algo: relaxed_lasso_1se
    display: RelaxedLassoCV_1SE
    params:
      cv: 5
      random_state: 42
      verbose: false
    cv: true

  - algo: elasticnet_1se
    display: ElasticNetCV_1SE
    params:
      cv_folds: 5
      random_state: 42
      verbose: false
    cv: true

  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV_1SE
    params:
      use_1se: true
      cv: 5
      verbose: false
    cv: true

# Output directory
output_dir: experiments/results/benchmark
# Exp3: ElasticNet-1SE and RelaxedLasso-1SE only
experiment: exp3_elasticnet_relaxed
description: "Exp3: ElasticNet-1SE and RelaxedLasso-1SE benchmark"
algo: elasticnet_1se

# Exp3 data settings (block diagonal correlation)
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: block
rho: 0.5
block_size: 10
n_blocks: 50
random_state: 42

n_repeats: 5
cv_folds: 1

search_space:
  sigma: [0.1, 0.5, 1.0, 1.5, 2.0, 3.0]

compare_models:
  - algo: elasticnet_1se
    display: ElasticNet-1SE
    params: {}
    cv: true

  - algo: relaxed_lasso_1se
    display: RelaxedLasso-1SE
    params: {}
    cv: true

output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
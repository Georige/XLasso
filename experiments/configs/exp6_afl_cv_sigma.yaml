# Exp6 PFL vs AdaptiveLassoCV Sigma Sensitivity Benchmark
# ======================================================
# Exp6 settings: The Decoy Trap, n=300, p=500
# 5 groups of 3 variables: first 2 in each group are true signal (β=1.0)
# 3rd in each group is noise decoy (correlated with group at ρ=0.8)
# Family: gaussian
# Methods: PFL vs AdaptiveLassoCV
# Repeats: 5 (external repeats for each sigma value)
#
# Usage:
#   python factory/sweep.py benchmark --config configs/exp6_afl_cv_sigma.yaml

experiment: exp6_pfl_cv_vs_adaptive
description: "Exp6 sigma sensitivity: PFLRegressorCV vs AdaptiveLassoCV, 5 repeats"
algo: pfl_regressor_cv

# Data generation parameters (Exp6 settings)
n_samples: 300
n_features: 500
n_nonzero: 10
correlation_type: experiment6
rho: 0.8
family: gaussian
random_state: 42

# External experiment settings
n_repeats: 20
cv_folds: 10
n_jobs: -1

# Primary metric
primary_metric: f1
max_iter: 10000

# Sigma values to test
search_space:
  sigma: [0.5, 1.0, 2.0, 3.0]

compare_models:
  - algo: pfl_regressor_cv
    display: CG-Lasso
    cv: true
    lambda_ridge_list: [0.1, 1.0, 10.0, 100.0]
    gamma: 1.0
    weight_cap: 10.0
    alpha_min_ratio: 0.0001
    n_alpha: 100
    max_iter: 10000
    tol: 0.0001
    standardize: true
    fit_intercept: true
  - algo: adaptive_lasso_cv
    display: AdaptiveLassoCV (fixed)
    cv: true
  - algo: lasso_cv
    display: LassoCV
    cv: true
  - algo: unilasso_cv
    display: UnilassoCV
    cv: true
  - algo: relaxed_lasso_1se
    display: RelaxedLassoCV
    cv: true
  - algo: elasticnet_1se
    display: ElasticNetCV
    cv: true

# Output settings
output_dir: ./experiments/results/exp6_pfl_cv_vs_adaptive

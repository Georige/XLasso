experiment: benchmark_realdata_10fold
dataset: riboflavin
algo: pfl_regressor_cv,adaptive_lasso_cv,unilasso_cv,lasso_cv,relaxed_lasso_1se
mode: random
window_size: 120
n_iter: 100
train_ratio: 0.8
seed_base: 42
cv_folds: 10
output_dir: experiments/results/realdata/benchmark_10fold
compare_models:
- algo: pfl_regressor_cv
  display: PFLRegressorCV (BAFL, gamma=1.0, cap=10.0)
  params:
    cv: 10
    lambda_ridge_list:
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    alpha_min_ratio: 0.0001
    n_alpha: 100
    max_iter: 10000
    tol: 0.0001
    random_state: 2026
    gamma: 1.0
    weight_cap: 10.0
- algo: adaptive_lasso_cv
  display: AdaptiveLassoCV (fixed)
  params:
    cv: 10
    max_iter: 10000
    tol: 0.0001
    random_state: 42
- algo: unilasso_cv
  display: UniLassoCV
  params:
    n_folds: 10
    lmda_min_ratio: 0.0001
    random_state: 42
- algo: lasso_cv
  display: LassoCV
  params:
    alphas:
    - 0.0001
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    cv: 10
    max_iter: 20000
    random_state: 42
- algo: relaxed_lasso_1se
  display: RelaxedLasso (1-SE rule)
  params:
    cv: 10
    random_state: 42
    eps: 0.001
    n_alphas: 100
n_jobs: -1
preprocess:
  method: standard
description: Compare BAFL, AFL family, Lasso on riboflavin with 10-fold CV

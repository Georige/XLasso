experiment: exp3_afl_cv_en_vs_adaptive
description: 'Exp3 sigma sensitivity: AFL-CV-EN (ElasticNet prior) vs AdaptiveLassoCV,
  5 repeats'
algo: adaptive_flipped_lasso_cv_en_classifier
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: experiment3
rho: 0.8
family: binomial
random_state: 42
n_repeats: 5
cv_folds: 10
n_jobs: -1
primary_metric: f1
search_space:
  sigma:
  - 0.5
  - 2.0
  - 10.0
lambda_ridge_list:
- 0.1
- 1.0
- 5.0
- 10.0
l1_ratio_list:
- 0.1
- 0.5
- 0.9
gamma_list:
- 0.3
- 0.5
- 0.7
- 1.0
- 2.0
- 3.0
alpha_min_ratio: 0.0001
n_alpha: 30
max_iter: 100000
tol: 0.0001
use_post_ols_debiasing: false
auto_tune_collinearity: false
weight_clip_max: null
eps: 1.0e-05
compare_models:
- algo: adaptive_flipped_lasso_cv_en_classifier
  display: AFL-CV-EN (ElasticNet)
  cv: true
- algo: adaptive_lasso_cv
  display: AdaptiveLassoCV (fixed)
  cv: true
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/exp3_afl_cv_en_vs_adaptive
sigma: 1.0
lambda_1: 0.01
lambda_2: 0.01
group_threshold: 0.7
config_path: /home/lili/lyn/clear/NLasso/XLasso/experiments/configs/exp3_afl_cv_sigma.yaml

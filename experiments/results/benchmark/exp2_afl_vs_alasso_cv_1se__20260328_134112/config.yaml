experiment: exp2_afl_vs_alasso_cv_1se
description: Exp2 Benchmark - AFL-CV-1SE vs AdaptiveLassoCV-1SE across multiple SNR
algo: adaptive_flipped_lasso_cv
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42
n_repeats: 5
cv_folds: 5
search_space:
  sigma:
  - 0.1
  - 0.3
  - 0.5
  - 0.7
  - 1.0
  - 1.5
  - 2.0
  - 3.0
lambda_ridge: 1.0
lambda_: 1.0
gamma: 0.5
compare_models:
- algo: aflclassifier_cv
  display: AFL-CV-1SE
  params:
    lambda_ridge_list:
    - 0.5
    - 1.0
    - 2.0
    gamma_list:
    - 0.3
    - 0.5
    - 0.7
    cv: 10
    n_alpha: 50
  cv: true
- algo: adaptive_lasso_cv
  display: AdaptiveLassoCV-1SE
  params:
    gammas:
    - 0.5
    - 1.0
    - 2.0
    cv: 10
    use_1se: true
  cv: true
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
sigma: 1.0
lambda_1: 0.01
lambda_2: 0.01
group_threshold: 0.7
config_path: configs/benchmark/exp2_afl_vs_alasso_cv_1se.yaml

experiment: exp6_pairwise_rho8_test
description: Exp6 Pairwise equicorrelated rho=0.8 - Quick test
algo: adaptive_flipped_lasso_cv
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: pairwise
rho: 0.8
random_state: 42
n_repeats: 3
cv_folds: 5
search_space:
  sigma:
  - 2.0
compare_models:
- algo: aflclassifier_cv
  display: AFL-CV-1SE
  params:
    lambda_ridge_list:
    - 0.5
    - 1.0
    - 2.0
    gamma_list:
    - 0.3
    - 0.5
    - 0.7
    cv: 10
    n_alpha: 50
    max_iter: 5000
  cv: true
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
sigma: 1.0
lambda_1: 0.01
lambda_2: 0.01
group_threshold: 0.7
config_path: /tmp/test_pairwise_rho8.yaml

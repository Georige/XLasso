experiment: exp2_afl_cv_tuned
description: Exp2 Benchmark - AdaptiveFlippedLassoCV with reduced search space and
  more training data
algo: adaptive_flipped_lasso_cv
n_samples: 300
n_features: 500
n_nonzero: 20
correlation_type: ar1
rho: 0.8
random_state: 42
n_repeats: 5
cv_folds: 1
search_space:
  sigma:
  - 0.1
  - 0.5
  - 1.0
  - 1.5
  - 2.0
  - 3.0
compare_models:
- algo: aflclassifier_cv
  display: AdaptiveFlippedLassoCV
  params:
    lambda_ridge_list:
    - 0.5
    - 1.0
    - 2.0
    gamma_list:
    - 0.3
    - 0.5
    - 0.7
    cv: 10
    n_alpha: 30
    alpha_min_ratio: 1e-3
  cv: true
output_dir: /home/lili/lyn/clear/NLasso/XLasso/experiments/results/benchmark
sigma: 1.0
lambda_1: 0.01
lambda_2: 0.01
group_threshold: 0.7
config_path: configs/benchmark/exp2_afl_cv_tuned.yaml
